<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AgroSoft Campo</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1b2a">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="logo_fainver.png" class="logoSplash">
<h1>AgroSoft Campo</h1>
<p>Registro de Compras y Gastos en Ganadería</p>
</div>

<header>

<img src="logo_fainver.png">

<div class="titulo">
<h1>AgroSoft Campo</h1>
<p>Registro de Compras y Gastos en Ganadería</p>
</div>

<img src="logoisabsoft.png">

</header>

<div class="dashboard">

<div class="card">
<h3>Animales</h3>
<span id="dashAnimales">0</span>
</div>

<div class="card">
<h3>Total Animales</h3>
<span id="dashTotalAnimales">0</span>
</div>

<div class="card">
<h3>Gastos</h3>
<span id="dashTotalGastos">0</span>
</div>

</div>

<div class="container">

<h2>Datos de la Compra</h2>

<label>N° Compra</label>
<input id="numeroCompra" readonly>

<label>Fecha</label>
<input type="date" id="fechaCompra">

<label>Proveedor</label>
<input id="proveedor">

<label>CI / RUC</label>
<input id="ci">

<label>Documento</label>
<input id="documento">

<hr>

<h2>Animales</h2>

<input placeholder="Caravana" id="caravana">
<input type="number" placeholder="Peso" id="peso">
<input type="number" placeholder="Precio Kg" id="precioKg">
<input type="number" placeholder="Precio Animal" id="precioAnimal">

<button onclick="agregarAnimal()">Agregar Animal</button>

<div class="table-container">
<table id="tablaAnimales">
<thead>
<tr>
<th>Caravana</th>
<th>Peso</th>
<th>Precio Kg</th>
<th>Total</th>
<th>X</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<p>Total: ₲ <span id="totalAnimales">0</span></p>

<hr>

<h2>Gastos</h2>

<input type="date" id="fechaGasto">

<select id="tipoGasto">
<option>Flete</option>
<option>Comision</option>
<option>COLCAT</option>
<option>Varios</option>
</select>

<input type="number" placeholder="Cantidad" id="cantidadGasto">
<input type="number" placeholder="Importe" id="importeGasto">
<textarea placeholder="Observación" id="obsGasto"></textarea>

<button onclick="agregarGasto()">Agregar Gasto</button>

<div class="table-container">
<table id="tablaGastos">
<thead>
<tr>
<th>N°</th>
<th>Fecha</th>
<th>Tipo</th>
<th>Total</th>
<th>X</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<p>Total Gastos: ₲ <span id="totalGastos">0</span></p>

<hr>

<button onclick="guardarCompra()">Guardar</button>
<button onclick="exportarExcel()">Exportar Excel</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js")
}
</script>

</body>
</html>
